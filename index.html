<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Fan — Admin Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary:      #2563eb;
      --primary-dark: #1d4ed8;
      --green:        #16a34a;
      --red:          #dc2626;
      --amber:        #d97706;
      --bg:           #f5f4f0;
      --card-bg:      #ffffff;
      --border:       #e8e5de;
      --text:         #1c1917;
      --text-2:       #57534e;
      --text-3:       #a8a29e;
      --shadow:       0 1px 2px rgba(0,0,0,0.05), 0 4px 12px rgba(0,0,0,0.06);
      --shadow-lg:    0 2px 4px rgba(0,0,0,0.06), 0 12px 28px rgba(0,0,0,0.08);
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 12px 12px 32px;
      position: relative;
      overflow-x: hidden;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 1100px;
      margin: 0 auto;
    }

    #fans-container {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    @media (min-width: 480px) {
      body { padding: 16px 16px 40px; }
      #fans-container { grid-template-columns: repeat(2, 1fr); gap: 11px; }
    }
    @media (min-width: 768px) {
      body { padding: 20px 20px 48px; }
      #fans-container { grid-template-columns: repeat(3, 1fr); gap: 12px; }
    }
    @media (min-width: 1024px) {
      body { padding: 24px 24px 48px; }
      #fans-container { grid-template-columns: repeat(4, 1fr); gap: 12px; }
    }

    .ambient {
      position: fixed;
      width: 600px; height: 600px;
      top: -200px; right: -200px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(37,99,235,0.07) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    #login-screen { display: block; }
    #dashboard-screen { display: none; }

    .login-wrap {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 16px;
    }
    .login-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 28px 20px;
      box-shadow: var(--shadow-lg);
      width: 100%; max-width: 380px;
    }
    @media (min-width: 480px) {
      .login-card { padding: 36px 32px; border-radius: 20px; }
    }
    .login-icon {
      width: 52px; height: 52px;
      border-radius: 14px;
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      display: flex; align-items: center; justify-content: center;
      color: var(--primary);
      margin: 0 auto 20px;
    }
    .login-card h1 {
      font-size: 1.5rem; font-weight: 800;
      letter-spacing: -0.025em; text-align: center;
      color: var(--text); margin-bottom: 4px;
    }
    .login-card .sub {
      text-align: center; font-size: 0.8rem; font-weight: 500;
      color: var(--text-3); margin-bottom: 28px;
    }
    .field-label {
      font-size: 0.72rem; font-weight: 700;
      color: var(--text-2); margin-bottom: 7px; display: block;
    }
    .pass-wrapper { position: relative; margin-bottom: 14px; }
    .pass-wrapper input {
      width: 100%; padding: 12px 44px 12px 14px;
      background: var(--bg); border: 1px solid var(--border);
      color: var(--text); border-radius: 10px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 0.95rem; font-weight: 500;
      transition: border-color 0.15s, box-shadow 0.15s; outline: none;
    }
    .pass-wrapper input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
    .pass-wrapper input.input-error { border-color: var(--red); box-shadow: 0 0 0 3px rgba(220,38,38,0.1); }
    .show-pass-btn {
      position: absolute; right: 11px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      padding: 4px; color: var(--text-3);
      display: flex; align-items: center;
      transition: color 0.15s; -webkit-tap-highlight-color: transparent;
    }
    .show-pass-btn:hover { color: var(--text-2); }

    .login-error {
      display: none; align-items: flex-start; gap: 10px;
      background: #fef2f2; border: 1px solid #fecaca;
      border-radius: 10px; padding: 12px 14px; margin-top: 12px;
    }
    .login-error.visible { display: flex !important; }
    .login-error .err-icon { color: var(--red); margin-top: 1px; flex-shrink: 0; }
    .login-error .err-text strong { display: block; font-size: 0.8rem; font-weight: 700; color: #b91c1c; }
    .login-error .err-text span { font-size: 0.72rem; font-weight: 500; color: #dc2626; }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      15% { transform: translateX(-6px); }
      30% { transform: translateX(6px); }
      45% { transform: translateX(-4px); }
      60% { transform: translateX(4px); }
      75% { transform: translateX(-2px); }
      90% { transform: translateX(2px); }
    }
    .shake { animation: shake 0.45s ease-in-out; }

    .primary-btn {
      width: 100%; padding: 13px;
      background: var(--primary); color: #fff;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 700; font-size: 0.95rem;
      border: none; border-radius: 10px; cursor: pointer;
      transition: all 0.15s ease-in-out;
      box-shadow: 0 2px 8px rgba(37,99,235,0.3), 0 1px 2px rgba(0,0,0,0.1);
    }
    .primary-btn:hover { background: var(--primary-dark); }
    .primary-btn:active { transform: scale(0.99); }

    .dash-header {
      display: flex; align-items: center;
      justify-content: space-between;
      margin-bottom: 14px; padding-top: 4px;
    }
    .dash-header h1 { font-size: 1.2rem; font-weight: 800; letter-spacing: -0.025em; color: var(--text); }
    .dash-header .badge {
      background: var(--primary); color: #fff;
      font-size: 0.65rem; font-weight: 700;
      letter-spacing: 0.04em; text-transform: uppercase;
      padding: 4px 10px; border-radius: 6px; flex-shrink: 0;
    }
    @media (min-width: 480px) {
      .dash-header { margin-bottom: 18px; padding-top: 6px; }
      .dash-header h1 { font-size: 1.4rem; }
    }
    @media (min-width: 768px) {
      .dash-header { margin-bottom: 22px; padding-top: 8px; }
      .dash-header h1 { font-size: 1.5rem; }
    }

    #alarm-banner {
      display: none;
      background: #fef2f2; border: 1px solid #fecaca;
      border-radius: 14px; padding: 14px 18px;
      margin-bottom: 18px; align-items: center; gap: 12px;
      animation: bannerPulse 1.2s ease-in-out infinite;
    }
    #alarm-banner.active { display: flex; }
    @keyframes bannerPulse {
      0%,100% { border-color: #fecaca; }
      50% { border-color: #f87171; }
    }
    .alarm-icon { color: var(--red); flex-shrink: 0; }
    .alarm-text h3 { font-size: 0.88rem; font-weight: 700; color: #b91c1c; letter-spacing: -0.01em; }
    .alarm-text p { font-size: 0.72rem; font-weight: 500; color: var(--red); margin-top: 2px; }
    #alarm-fan-list { font-weight: 700; }

    .fan-card {
      background: var(--card-bg); border: 1px solid var(--border);
      border-radius: 16px; padding: 14px; box-shadow: var(--shadow);
      transition: border-color 0.25s;
    }
    .fan-card.suicide-alert {
      border-color: #fca5a5;
      animation: cardPulse 1.4s ease-in-out infinite;
    }
    @keyframes cardPulse {
      0%,100% { border-color: #fca5a5; }
      50% { border-color: #f87171; }
    }

    .card-top { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .fan-avatar {
      width: 36px; height: 36px; border-radius: 10px;
      background: #eff6ff; border: 1px solid #bfdbfe;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; color: var(--primary);
    }
    .fan-avatar.spinning svg { animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .card-meta { flex: 1; min-width: 0; overflow: hidden; }
    .name-row { display: flex; align-items: center; gap: 5px; min-width: 0; }
    .fan-local-name {
      font-size: 0.88rem; font-weight: 700; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      flex: 1; min-width: 0;
    }
    .fan-id-sub { font-size: 0.68rem; font-weight: 500; color: var(--text-3); margin-top: 2px; }

    .edit-name-btn {
      background: none; border: none; cursor: pointer;
      padding: 3px; color: var(--text-3);
      display: flex; align-items: center;
      border-radius: 5px; transition: color 0.12s, background 0.12s; flex-shrink: 0;
    }
    .edit-name-btn:hover { color: var(--primary); background: #eff6ff; }

    .name-edit-input {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 0.85rem; font-weight: 600; color: var(--text);
      background: var(--bg); border: 1px solid var(--primary);
      border-radius: 7px; padding: 3px 8px; width: 100%; outline: none; display: none;
    }
    .name-edit-input.visible { display: block; }
    .name-edit-actions { display: none; gap: 4px; margin-top: 4px; }
    .name-edit-actions.visible { display: flex; }
    .name-save-btn, .name-cancel-btn {
      border: none; border-radius: 6px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 0.68rem; font-weight: 700;
      padding: 3px 8px; cursor: pointer; transition: all 0.12s;
    }
    .name-save-btn { background: var(--primary); color: #fff; }
    .name-save-btn:hover { background: var(--primary-dark); }
    .name-cancel-btn { background: #f5f4f0; color: var(--text-2); border: 1px solid var(--border); }
    .name-cancel-btn:hover { background: #ede9e3; }

    .status-copy-row {
      display: flex; align-items: center;
      justify-content: space-between; gap: 8px; margin-top: 8px;
    }
    .device-status { display: inline-flex; align-items: center; gap: 5px; font-size: 0.72rem; font-weight: 600; color: var(--text-2); }
    .device-dot { width: 7px; height: 7px; border-radius: 50%; background: #d6d3cd; flex-shrink: 0; transition: background 0.3s; }
    .device-dot.on { background: var(--green); box-shadow: 0 0 5px rgba(22,163,74,0.45); }

    .alert-badge {
      display: none; align-items: center; gap: 4px;
      font-size: 0.68rem; font-weight: 700; color: var(--red);
      background: #fef2f2; border: 1px solid #fecaca;
      border-radius: 5px; padding: 2px 7px;
    }
    .alert-badge.visible { display: inline-flex; }

    .copy-btn {
      background: var(--bg); color: var(--text-2);
      border: 1px solid var(--border); padding: 5px 11px;
      border-radius: 7px; font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 0.68rem; font-weight: 600; cursor: pointer;
      transition: all 0.12s ease-in-out; white-space: nowrap; flex-shrink: 0;
    }
    .copy-btn:hover { background: #ede9e3; border-color: #d6d3cd; }
    .copy-btn:active { transform: scale(0.97); }
    .copy-btn.copied { background: #f0fdf4; color: var(--green); border-color: #bbf7d0; }

    .card-divider { height: 1px; background: var(--border); margin: 10px 0; }

    .admin-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; align-items: flex-start; }
    .ctrl-group { min-width: 0; }
    .section-label { font-size: 0.65rem; font-weight: 600; color: var(--text-3); margin-bottom: 5px; }

    @media (max-width: 479px) {
      .fan-card { padding: 12px; }
      .card-top { gap: 8px; margin-bottom: 8px; }
      .status-copy-row { margin-top: 6px; }
      .copy-btn { padding: 6px 10px; font-size: 0.7rem; }
      .status-pill { padding: 6px 10px; font-size: 0.7rem; }
      .suicide-off-btn { padding: 6px 10px; font-size: 0.7rem; }
      .card-divider { margin: 8px 0; }
      .pass-wrapper input { font-size: 1rem; padding: 13px 44px 13px 14px; }
      .primary-btn { padding: 14px; font-size: 1rem; }
    }

    .status-pill {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 5px 11px; border-radius: 7px;
      border: 1px solid #bbf7d0; background: #f0fdf4;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 0.68rem; font-weight: 700; color: var(--green);
      cursor: pointer; transition: all 0.12s ease-in-out;
      white-space: nowrap; -webkit-tap-highlight-color: transparent;
    }
    .status-pill:hover { background: #dcfce7; border-color: #86efac; }
    .status-pill:active { transform: scale(0.97); }

    .locked-chip {
      display: none; align-items: center; gap: 4px;
      font-size: 0.68rem; font-weight: 700; color: #92400e;
      background: #fffbeb; border: 1px solid #fde68a;
      border-radius: 5px; padding: 2px 8px; margin-left: 4px;
    }
    .locked-chip.visible { display: inline-flex; }

    .suicide-row {
      display: flex; align-items: center; justify-content: space-between;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 10px; padding: 8px 11px;
      transition: border-color 0.2s, background 0.2s;
    }
    .suicide-row.is-triggered { background: #fef2f2; border-color: #fecaca; }
    .suicide-label { display: flex; align-items: center; gap: 7px; }
    .suicide-label .s-dot { width: 6px; height: 6px; border-radius: 50%; background: #d6d3cd; flex-shrink: 0; }
    .suicide-row.is-triggered .s-dot { background: var(--red); }
    .suicide-label span { font-size: 0.72rem; font-weight: 600; color: var(--text-2); }
    .suicide-row.is-triggered .suicide-label span { color: var(--red); }

    .suicide-off-btn {
      background: var(--red); color: #fff;
      border: none; padding: 4px 10px; border-radius: 6px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 0.68rem; font-weight: 700; cursor: pointer;
      transition: all 0.12s ease-in-out;
      animation: btnPulse 1.2s ease-in-out infinite;
    }
    .suicide-off-btn:hover { background: #b91c1c; }
    .suicide-off-btn:active { transform: scale(0.96); }
    @keyframes btnPulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(220,38,38,0.35); }
      50% { box-shadow: 0 0 0 5px rgba(220,38,38,0); }
    }

    .empty-state {
      grid-column: 1 / -1; text-align: center; padding: 48px 20px;
      color: var(--text-3); font-weight: 500; font-size: 0.88rem;
    }
    .loading-dots span {
      display: inline-block; width: 7px; height: 7px; border-radius: 50%;
      background: var(--primary); margin: 0 2px;
      animation: bounce 1.2s infinite ease-in-out;
    }
    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%,80%,100% { transform: translateY(0); }
      40% { transform: translateY(-7px); }
    }
  </style>
</head>
<body>

  <div class="ambient"></div>

  <div class="container">

    <!-- Login Screen -->
    <div id="login-screen">
      <div class="login-wrap">
        <div class="login-card">
          <div class="login-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
          </div>
          <h1>Admin Hub</h1>
          <p class="sub">Smart Fan Control System</p>
          <label class="field-label" for="admin-pass">Password</label>
          <div class="pass-wrapper">
            <input type="password" id="admin-pass" placeholder="Enter password" autocomplete="off">
            <button class="show-pass-btn" id="show-pass-btn" type="button" aria-label="Toggle password visibility">
              <svg id="eye-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <button class="primary-btn" id="login-btn">Sign in</button>
          <div class="login-error" id="login-error">
            <svg class="err-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            <div class="err-text">
              <strong>Incorrect password</strong>
              <span>Please try again.</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Dashboard Screen -->
    <div id="dashboard-screen">
      <div class="dash-header">
        <h1>Fan Control</h1>
        <span class="badge">Admin</span>
      </div>
      <div id="alarm-banner">
        <svg class="alarm-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        <div class="alarm-text">
          <h3>Suicide trigger active</h3>
          <p>Affected: <span id="alarm-fan-list">—</span></p>
        </div>
      </div>
      <div id="fans-container">
        <div class="empty-state">
          <div class="loading-dots"><span></span><span></span><span></span></div>
          <p style="margin-top:12px;">Loading fan units…</p>
        </div>
      </div>
    </div>

  </div>

  <audio id="alarm-audio" loop>
    <source src="data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAESsAACJWAAACABAAZGF0YQAAAAA=">
  </audio>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, get, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const app = initializeApp({
      databaseURL: "https://smart-fan-with-anti-suicide-default-rtdb.asia-southeast1.firebasedatabase.app/"
    });
    const db = getDatabase(app);

    const loginScreen     = document.getElementById('login-screen');
    const dashboardScreen = document.getElementById('dashboard-screen');
    const loginBtn        = document.getElementById('login-btn');
    const passInput       = document.getElementById('admin-pass');
    const errorText       = document.getElementById('login-error');
    const fansContainer   = document.getElementById('fans-container');
    const alarmBanner     = document.getElementById('alarm-banner');
    const alarmFanList    = document.getElementById('alarm-fan-list');

    const suicideActiveSet = new Set();
    let alarmCtx = null, beepFn = null, alarmInterval = null;

    function buildAlarmSound() {
      try {
        alarmCtx = new (window.AudioContext || window.webkitAudioContext)();
        return function beep() {
          const osc = alarmCtx.createOscillator();
          const gain = alarmCtx.createGain();
          osc.connect(gain);
          gain.connect(alarmCtx.destination);
          osc.type = 'square';
          osc.frequency.setValueAtTime(880, alarmCtx.currentTime);
          osc.frequency.setValueAtTime(660, alarmCtx.currentTime + 0.2);
          gain.gain.setValueAtTime(0.4, alarmCtx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.001, alarmCtx.currentTime + 0.4);
          osc.start(alarmCtx.currentTime);
          osc.stop(alarmCtx.currentTime + 0.4);
        };
      } catch(e) { return null; }
    }

    function startAlarm() {
      if (alarmInterval) return;
      if (!beepFn) beepFn = buildAlarmSound();
      if (beepFn) { beepFn(); alarmInterval = setInterval(beepFn, 1500); }
      alarmBanner.classList.add('active');
    }

    function stopAlarm() {
      clearInterval(alarmInterval);
      alarmInterval = null;
      alarmBanner.classList.remove('active');
    }

    function updateAlarmState() {
      if (suicideActiveSet.size > 0) {
        alarmFanList.textContent = [...suicideActiveSet].map(id => {
          const el = document.getElementById(`local-name-${id}`);
          return el ? el.textContent : `Fan ${id}`;
        }).join(', ');
        startAlarm();
      } else {
        stopAlarm();
      }
    }

    // Show / Hide Password
    const showPassBtn = document.getElementById('show-pass-btn');
    let passVisible = false;
    showPassBtn.addEventListener('click', (e) => {
      e.preventDefault();
      e.stopPropagation();
      passVisible = !passVisible;
      passInput.type = passVisible ? 'text' : 'password';
      document.getElementById('eye-icon').innerHTML = passVisible
        ? '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>'
        : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
      passInput.focus();
    });

    // Login
    loginBtn.addEventListener('click', doLogin);
    passInput.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

    function doLogin() {
      if (passInput.value.trim() === 'PASSWORD_FAN') {
        loginScreen.style.display    = 'none';
        dashboardScreen.style.display = 'block';
        loadFans();
      } else {
        errorText.classList.add('visible');
        passInput.classList.add('input-error');
        passInput.value = '';
        passInput.focus();
        const card = document.querySelector('.login-card');
        card.classList.remove('shake');
        void card.offsetWidth;
        card.classList.add('shake');
        card.addEventListener('animationend', () => card.classList.remove('shake'), { once: true });
        passInput.addEventListener('input', () => {
          passInput.classList.remove('input-error');
          errorText.classList.remove('visible');
        }, { once: true });
      }
    }

    // Load all fans
    async function loadFans() {
      fansContainer.innerHTML = '<div class="empty-state"><div class="loading-dots"><span></span><span></span><span></span></div><p style="margin-top:12px;">Loading fan units…</p></div>';
      try {
        const snapshot = await get(ref(db, 'Fan Number'));
        fansContainer.innerHTML = '';
        if (snapshot.exists()) {
          snapshot.forEach((child) => {
            const fanId   = child.key;
            const fanData = child.val();
            if (fanData && fanData.key) createFanCard(fanId, fanData.key);
          });
        } else {
          fansContainer.innerHTML = '<div class="empty-state">No fans provisioned in the database.</div>';
        }
      } catch (err) {
        fansContainer.innerHTML = '<div class="empty-state" style="color:#ef4444">Database connection failed.</div>';
      }
    }

    // Fan Card builder
    function createFanCard(fanId, key) {
      const card = document.createElement('div');
      card.className = 'fan-card';
      card.id = `card-${fanId}`;

      card.innerHTML = `
        <div class="card-top">
          <div class="fan-avatar" id="avatar-${fanId}">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 12c0 0-2.5-5-7-5.5C3 6.3 2 8 3 10c1 2 4 2 4 2s-3 0-4 2c-1 2 0 3.7 2 3.5C9.5 17 12 12 12 12z"/>
              <path d="M12 12c0 0 5-2.5 5.5-7 .2-2-1.5-3-3.5-2-2 1-2 4-2 4s0-3-2-4c-2-1-3.7 0-3.5 2C7 9.5 12 12 12 12z"/>
              <path d="M12 12c0 0 2.5 5 7 5.5 2 .2 3-1.5 2-3.5-1-2-4-2-4-2s3 0 4-2c1-2 0-3.7-2-3.5C14.5 7 12 12 12 12z"/>
              <circle cx="12" cy="12" r="2"/>
            </svg>
          </div>
          <div class="card-meta">
            <div class="name-row">
              <span class="fan-local-name" id="local-name-${fanId}">Fan Unit ${fanId}</span>
              <button class="edit-name-btn" id="edit-name-btn-${fanId}" title="Rename">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                  <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                </svg>
              </button>
            </div>
            <input class="name-edit-input" id="name-input-${fanId}" type="text" maxlength="30" placeholder="Enter name">
            <div class="name-edit-actions" id="name-actions-${fanId}">
              <button class="name-save-btn" id="name-save-${fanId}">Save</button>
              <button class="name-cancel-btn" id="name-cancel-${fanId}">Cancel</button>
            </div>
            <div class="fan-id-sub">ID: ${fanId}</div>
          </div>
        </div>

        <div class="status-copy-row">
          <div style="display:flex;align-items:center;gap:8px;">
            <span class="device-status">
              <span class="device-dot" id="dot-onoff-${fanId}"></span>
              <span id="label-onoff-${fanId}">Off</span>
            </span>
            <span class="alert-badge" id="chip-suicide-${fanId}">
              <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
              Alert
            </span>
          </div>
          <button class="copy-btn" id="copy-${fanId}">Copy link</button>
        </div>

        <div class="card-divider"></div>

        <div class="admin-controls">
          <div class="ctrl-group">
            <p class="section-label">Status</p>
            <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
              <button class="status-pill" id="sp-normal-${fanId}">Normal</button>
              <span class="locked-chip" id="chip-status-${fanId}">Locked</span>
            </div>
          </div>
          <div class="ctrl-group">
            <p class="section-label">Suicide flag</p>
            <div class="suicide-row" id="suicide-row-${fanId}">
              <div class="suicide-label">
                <span class="s-dot"></span>
                <span id="suicide-label-${fanId}">Off</span>
              </div>
              <button class="suicide-off-btn" id="suicide-off-btn-${fanId}" style="display:none;">Dismiss</button>
            </div>
          </div>
        </div>
      `;

      fansContainer.appendChild(card);

      // Copy link
      document.getElementById(`copy-${fanId}`).addEventListener('click', () => {
        const link = `${window.location.origin}/control.html?fan=${encodeURIComponent(fanId)}&key=${encodeURIComponent(key)}`;
        navigator.clipboard.writeText(link).then(() => {
          const btn = document.getElementById(`copy-${fanId}`);
          btn.textContent = 'Copied!';
          btn.classList.add('copied');
          setTimeout(() => { btn.textContent = 'Copy link'; btn.classList.remove('copied'); }, 2000);
        });
      });

      // Editable name
      const localNameEl   = document.getElementById(`local-name-${fanId}`);
      const nameInput     = document.getElementById(`name-input-${fanId}`);
      const editBtn       = document.getElementById(`edit-name-btn-${fanId}`);
      const nameActions   = document.getElementById(`name-actions-${fanId}`);
      const nameSaveBtn   = document.getElementById(`name-save-${fanId}`);
      const nameCancelBtn = document.getElementById(`name-cancel-${fanId}`);

      function enterEditMode() {
        nameInput.value = localNameEl.textContent;
        localNameEl.style.display = 'none';
        editBtn.style.display = 'none';
        nameInput.classList.add('visible');
        nameActions.classList.add('visible');
        nameInput.focus(); nameInput.select();
      }
      function exitEditMode() {
        nameInput.classList.remove('visible');
        nameActions.classList.remove('visible');
        localNameEl.style.display = '';
        editBtn.style.display = '';
      }
      function saveName() {
        const newName = nameInput.value.trim();
        if (!newName) return exitEditMode();
        set(ref(db, `Fan Number/${fanId}/Local Name`), newName)
          .then(() => { localNameEl.textContent = newName; exitEditMode(); })
          .catch(() => exitEditMode());
      }

      editBtn.addEventListener('click', enterEditMode);
      nameSaveBtn.addEventListener('click', saveName);
      nameCancelBtn.addEventListener('click', exitEditMode);
      nameInput.addEventListener('keydown', e => {
        if (e.key === 'Enter') saveName();
        if (e.key === 'Escape') exitEditMode();
      });

      // Status button
      document.getElementById(`sp-normal-${fanId}`).addEventListener('click', () => {
        set(ref(db, `Fan Number/${fanId}/Status`), 'Normal')
          .catch(err => console.error('Status write failed:', err));
      });

      // Suicide dismiss button
      document.getElementById(`suicide-off-btn-${fanId}`).addEventListener('click', () => {
        set(ref(db, `Fan Number/${fanId}/Suicide`), false)
          .catch(err => console.error('Suicide write failed:', err));
      });

      // Realtime listener
      onValue(ref(db, `Fan Number/${fanId}`), (snapshot) => {
        const data = snapshot.val();
        if (!data) return;

        const speed     = data['Fan Speed'] ?? 0;
        const status    = data['Status'] ?? 'Normal';
        const suicide   = data['Suicide'] === true || data['Suicide'] === 'true';
        const localName = data['Local Name'];

        // Local name
        if (localName) {
          const el = document.getElementById(`local-name-${fanId}`);
          if (el) el.textContent = localName;
        }

        // ON / OFF dot
        const dot   = document.getElementById(`dot-onoff-${fanId}`);
        const label = document.getElementById(`label-onoff-${fanId}`);
        if (dot && label) {
          dot.classList.toggle('on', speed > 0);
          label.textContent = speed > 0 ? 'On' : 'Off';
        }

        // Status: Normal button vs Locked chip
        const normalBtn  = document.getElementById(`sp-normal-${fanId}`);
        const statusChip = document.getElementById(`chip-status-${fanId}`);
        if (normalBtn && statusChip) {
          if (status === 'Locked') {
            normalBtn.textContent = 'Unlock';
            statusChip.classList.add('visible');
          } else {
            normalBtn.textContent = 'Normal';
            normalBtn.className   = 'status-pill';
            statusChip.classList.remove('visible');
          }
        }

        // Suicide flag
        const suicideBadge  = document.getElementById(`chip-suicide-${fanId}`);
        const suicideOffBtn = document.getElementById(`suicide-off-btn-${fanId}`);
        const suicideRow    = document.getElementById(`suicide-row-${fanId}`);
        const suicideLabel  = document.getElementById(`suicide-label-${fanId}`);

        if (suicideBadge)  suicideBadge.classList.toggle('visible', suicide);
        if (suicideLabel)  suicideLabel.textContent = suicide ? 'Active' : 'Off';
        if (suicideOffBtn) suicideOffBtn.style.display = suicide ? 'inline-block' : 'none';
        if (suicideRow)    suicideRow.classList.toggle('is-triggered', suicide);
        card.classList.toggle('suicide-alert', suicide);

        if (suicide) suicideActiveSet.add(fanId);
        else         suicideActiveSet.delete(fanId);
        updateAlarmState();
      });
    }
  </script>
</body>
</html>
